<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Coming Soon — BurgerLab Premium Burger &amp; Restaurant Template</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="BurgerLab">
<meta name="description" content="BurgerLab is opening soon — leave your email and we'll let you know the moment doors open.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<body>


<main id="main">
  <section class="bl-section bl-coming">
    <div class="bl-container bl-container--narrow bl-error">
      <a href="index.html" class="bl-logo bl-coming__logo"><img class="bl-logo__mark bl-logo__mark--dark" src="assets/images/logo-dark.svg" alt="" width="28" height="28" aria-hidden="true"><img class="bl-logo__mark bl-logo__mark--light" src="assets/images/logo-light.svg" alt="" width="28" height="28" aria-hidden="true">Burger<span>Lab</span></a>
      <h1 class="bl-error__title">Something <em class="bl-accent-text">delicious</em> is coming.</h1>
      <p class="bl-error__lede">We're firing up the grills and putting the final touches on the new BurgerLab. Leave your email and we'll let you know the moment the doors open.</p>

      <div class="bl-countdown" data-countdown="2026-08-15T11:00:00">
        <div class="bl-countdown__item">
          <span class="bl-countdown__num" data-cd="days">00</span>
          <span class="bl-countdown__label">Days</span>
        </div>
        <div class="bl-countdown__item">
          <span class="bl-countdown__num" data-cd="hours">00</span>
          <span class="bl-countdown__label">Hours</span>
        </div>
        <div class="bl-countdown__item">
          <span class="bl-countdown__num" data-cd="minutes">00</span>
          <span class="bl-countdown__label">Minutes</span>
        </div>
        <div class="bl-countdown__item">
          <span class="bl-countdown__num" data-cd="seconds">00</span>
          <span class="bl-countdown__label">Seconds</span>
        </div>
      </div>

      <form action="https://api.web3forms.com/submit" method="POST" data-form data-success="You're on the list — we'll email you the moment we open.">
        <input type="hidden" name="access_key" value="1689852d-c68d-46fa-977e-51c4bc04d29a">
        <input type="hidden" name="subject" value="New BurgerLab opening-day signup">
        <input type="hidden" name="from_name" value="BurgerLab Website">
        <input type="checkbox" name="botcheck" class="bl-honeypot" tabindex="-1" aria-hidden="true">
        <div class="bl-footer__newsletter-form">
          <input type="email" name="email" placeholder="you@example.com" aria-label="Email address" required>
          <button type="submit" class="bl-btn bl-btn--primary">Notify me</button>
        </div>
        <p class="bl-form__note" role="status" aria-live="polite"></p>
      </form>

      <div class="bl-footer__social bl-coming__social">
        <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></a>
        <a href="#" aria-label="TikTok"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 3c.3 2.2 1.7 3.8 3.9 4v3c-1.4 0-2.8-.4-3.9-1.1V15a6 6 0 1 1-6-6c.3 0 .7 0 1 .1v3.1A3 3 0 1 0 13 15V3z"/></svg></a>
        <a href="#" aria-label="Facebook"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M14 9h3V6h-3c-1.7 0-3 1.3-3 3v2H8v3h3v7h3v-7h2.5l.5-3H14V9z"/></svg></a>
        <a href="#" aria-label="X"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3l7.5 9.5L3.5 21H6l5.3-6.3L16 21h5l-7.8-10L20.5 3H18l-5 5.9L8 3z"/></svg></a>
      </div>

      <div class="bl-error__modes">
        <button class="bl-mode-btn-page" type="button" data-theme="dark" aria-label="Dark mode">Dark Mode</button>
        <button class="bl-mode-btn-page" type="button" data-theme="light" aria-label="Light mode">Light Mode</button>
      </div>
    </div>
  </section>
</main>

<!-- Vendor JS -->
<script src="assets/js/vendors/gsap.min.js"></script>
<script src="assets/js/vendors/ScrollTrigger.min.js"></script>

</html>
